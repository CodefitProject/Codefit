version: '3.8'

services:
  backend:
    image: ${DOCKER_HUB_USERNAME:-default}/codefit-backend:latest
    container_name: codefit-backend
    ports:
      - "8080:8080"
    environment:
      - jwt.secret=${JWT_SECRET}
    depends_on:
      - redis
      - mysql
    networks:
      - codefit-network

  frontend:
    image: ${DOCKER_HUB_USERNAME:-default}/codefit-frontend:latest
    container_name: codefit-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - codefit-network

  redis:
    image: redis:7-alpine
    container_name: codefit-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - codefit-network

  mysql:
    image: mysql:8.0
    container_name: codefit-mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - codefit-network

volumes:
  redis_data:
    driver: local
  mysql_data:
    driver: local

networks:
  codefit-network:
    driver: bridge