name: CD - Deploy to EC2

on:
  pull_request:
    branches: [cd_test*]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: docker-compose.yml 파일 EC2로 복사
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "docker-compose.yml,scripts/"
          target: "/home/ubuntu/codefit/"

      - name: EC2에 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
                    script: |
            cd /home/ubuntu/codefit
            
            # Docker Hub에서 최신 이미지 pull
            echo "Docker Hub에서 최신 이미지를 가져옵니다..."
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-frontend:latest || echo "Frontend 이미지 없음"
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-backend:latest || echo "Backend 이미지 없음"
            
            # 기존 컨테이너 중지 및 제거
            docker-compose down
            
            # .env 파일 생성 (JWT 설정)
            echo "Creating .env file for JWT settings..."
            cat <<EOF > ./.env
            jwt.secret=${{ secrets.JWT_SECRET }}
            jwt.access-token-expiration-ms=${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION_MS }}
            jwt.refresh-token-expiration-ms=${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION_MS }}
            EOF

            # 환경변수 설정
            export DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
            
            # 새로운 컨테이너 시작
            docker-compose up -d
            
            # 컨테이너 상태 확인
            sleep 10
            docker-compose ps
            
            # 헬스체크
            echo "서비스 헬스체크 중..."
            sleep 30
            
            # Frontend 헬스체크
            curl -f http://localhost:80 || echo "Frontend 헬스체크 실패"
            
            # Backend 헬스체크  
            curl -f http://localhost:8080/ || echo "Backend 헬스체크 실패"
            
            # 오래된 이미지 정리
            docker image prune -f