name: Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [release_ver_*, cd_test]

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      backend-changed: ${{ steps.changes.outputs.backend }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 변경된 파일 감지
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

      - name: JDK 21 설정
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Node.js 설정
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 프론트엔드 의존성 설치
        if: steps.changes.outputs.frontend == 'true'
        run: |
          cd frontend
          npm ci

#      - name: 프론트엔드 테스트 실행
#        if: steps.changes.outputs.frontend == 'true'
#        run: |
#          cd frontend
#          npm test -- --coverage --watchAll=false

      - name: 프론트엔드 빌드
        if: steps.changes.outputs.frontend == 'true'
        run: |
          cd frontend
          CI=false npm run build

      - name: gradlew 실행 권한 부여
        if: steps.changes.outputs.backend == 'true'
        run: chmod +x backend/gradlew

#      - name: 백엔드 테스트 실행
#        if: steps.changes.outputs.backend == 'true'
#        run: |
#          cd backend
#          ./gradlew test

      - name: 백엔드 빌드
        if: steps.changes.outputs.backend == 'true'
        run: |
          cd backend
          ./gradlew build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'pull_request' && github.head_ref == 'cd_test')
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 프론트엔드 Docker 이미지 빌드
        if: needs.test.outputs.frontend-changed == 'true'
        run: |
          docker build -t codefit-frontend:${{ github.sha }} ./frontend

      - name: 백엔드 Docker 이미지 빌드
        if: needs.test.outputs.backend-changed == 'true'
        run: |
          docker build -t codefit-backend:${{ github.sha }} ./backend

      - name: 프론트엔드 Docker 이미지 저장
        if: needs.test.outputs.frontend-changed == 'true'
        run: |
          docker save codefit-frontend:${{ github.sha }} | gzip > frontend-image.tar.gz

      - name: 백엔드 Docker 이미지 저장
        if: needs.test.outputs.backend-changed == 'true'
        run: |
          docker save codefit-backend:${{ github.sha }} | gzip > backend-image.tar.gz

      - name: 프론트엔드 파일 EC2로 복사
        if: needs.test.outputs.frontend-changed == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "frontend-image.tar.gz,docker-compose.yml,scripts/"
          target: "/home/ubuntu/codefit/"

      - name: 백엔드 파일 EC2로 복사
        if: needs.test.outputs.backend-changed == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "backend-image.tar.gz,docker-compose.yml,scripts/"
          target: "/home/ubuntu/codefit/"

      - name: EC2에 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/codefit
            
            # 프론트엔드 이미지가 있다면 로드
            if [ -f "frontend-image.tar.gz" ]; then
              docker load < frontend-image.tar.gz
              docker tag codefit-frontend:${{ github.sha }} codefit-frontend:latest
            fi
            
            # 백엔드 이미지가 있다면 로드
            if [ -f "backend-image.tar.gz" ]; then
              docker load < backend-image.tar.gz
              docker tag codefit-backend:${{ github.sha }} codefit-backend:latest
            fi
            
            # 기존 컨테이너 중지
            docker-compose down
            
            # 새 컨테이너 시작
            docker-compose up -d
            
            # 오래된 이미지 정리
            docker image prune -f
            
            # 전송된 파일 정리
            rm -f frontend-image.tar.gz backend-image.tar.gz
            
            # 헬스체크 (백엔드가 변경된 경우에만)
            if [ -f "backend-image.tar.gz" ] || docker ps | grep -q codefit-backend; then
              sleep 30
              curl -f http://localhost:8080/health || exit 1
            fi