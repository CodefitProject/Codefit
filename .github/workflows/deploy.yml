name: CI - Build and Test

on:
  pull_request:
    branches: [release_ver_*]

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      backend-changed: ${{ steps.changes.outputs.backend }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 변경된 파일 감지
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

      - name: 변경사항 확인 로그
        run: |
          echo "Frontend changed: ${{ steps.changes.outputs.frontend }}"
          echo "Backend changed: ${{ steps.changes.outputs.backend }}"

      - name: JDK 21 설정
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Node.js 설정
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 프론트엔드 의존성 설치
        if: steps.changes.outputs.frontend == 'true'
        run: |
          cd frontend
          npm ci

#      - name: 프론트엔드 테스트 실행
#        if: steps.changes.outputs.frontend == 'true'
#        run: |
#          cd frontend
#          npm test -- --coverage --watchAll=false

# 프론트엔드 빌드는 Docker 이미지 빌드 시에만 수행 (중복 제거)

      - name: gradlew 실행 권한 부여
        if: steps.changes.outputs.backend == 'true'
        run: chmod +x backend/gradlew

#      - name: 백엔드 테스트 실행
#        if: steps.changes.outputs.backend == 'true'
#        run: |
#          cd backend
#          ./gradlew test

      - name: 백엔드 빌드
        if: steps.changes.outputs.backend == 'true'
        run: |
          cd backend
          ./gradlew build

      - name: Docker Hub 정보 디버깅
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true'
        run: |
          echo "Username: ${{ secrets.DOCKER_HUB_USERNAME }}"
          echo "Token exists: ${{ secrets.DOCKER_HUB_TOKEN != '' }}"
          
      - name: Docker Hub 로그인
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Docker Build x 설정
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.backend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: 프론트엔드 Docker 이미지 빌드 및 푸시
        if: steps.changes.outputs.frontend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-frontend:${{ github.sha }} ./frontend
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-frontend:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-frontend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-frontend:latest

      - name: 백엔드 Docker 이미지 빌드 및 푸시
        if: steps.changes.outputs.backend == 'true'
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-backend:${{ github.sha }} ./backend
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-backend:${{ github.sha }} ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-backend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/codefit-backend:latest

